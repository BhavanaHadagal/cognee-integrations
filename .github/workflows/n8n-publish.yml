# Publishes the n8n community node package (integrations/n8n) to npm on tag push.
#
# Starting May 1 2026, n8n requires verified community nodes to be published via
# GitHub Actions with npm provenance attestations. This workflow satisfies that.
# Provenance lets anyone cryptographically verify the package was built by this
# exact workflow, from this exact repository and commit.
#
# ─── PREREQUISITES ─────────────────────────────────────────────────────────────
#
# @n8n/node-cli ≥ 0.23.0 in integrations/n8n/package.json (it gates provenance).
# Check: `cd integrations/n8n && npm list @n8n/node-cli`.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# This package was previously published from `topoteretes/cognee-n8n` with
# workflow filename `publish.yml`. After migrating into this monorepo, the npm
# Trusted Publisher binding must be re-registered:
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. On npmjs.com, open the `n8n-nodes-cognee` package settings.
#   2. Under "Publish access" → "Trusted Publishers", remove the old binding to
#      `topoteretes/cognee-n8n` and add a new one:
#        Repository owner: topoteretes
#        Repository name:  cognee-integrations
#        Workflow name:    n8n-publish.yml
#        Environment:      (leave blank)
#   3. Leave the NPM_TOKEN secret unset in this repo — GitHub's OIDC token is
#      used instead.
#
# Option B — npm Automation Token (fallback):
#   1. On npmjs.com: generate a Granular Access Token scoped to `n8n-nodes-cognee`
#      with read+write publish permission.
#   2. In GitHub repo settings: add it as the NPM_TOKEN secret.
#
# Both options work with --provenance.
#
# ─── TAG CONVENTION ────────────────────────────────────────────────────────────
#
# Triggers on tags matching `n8n-v*.*.*` (e.g. n8n-v0.4.2). The prefix scopes
# this workflow to n8n releases only, so other integrations in this monorepo can
# use their own tag schemes without colliding.
#
# The package.json `release-it` config in integrations/n8n applies the prefix
# automatically when you run `npm run release`.
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
#   cd integrations/n8n
#   npm run release
#
# release-it (invoked by @n8n/node-cli) bumps the version, regenerates the
# changelog, commits, tags as `n8n-v<version>`, and pushes — triggering this
# workflow to publish to npm with provenance.

name: n8n Publish

on:
  push:
    tags:
      - 'n8n-v*.*.*'

jobs:
  publish:
    name: Publish n8n-nodes-cognee to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default (write) for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: integrations/n8n/package-lock.json

      - name: Install dependencies
        working-directory: integrations/n8n
        run: npm ci

      - name: Release
        # In CI mode (GITHUB_ACTIONS=true), @n8n/node-cli's release command runs
        # `npm run lint && npm run build && npm publish` with NPM_CONFIG_PROVENANCE.
        # The tag was already created by `npm run release` locally; this step just
        # publishes whatever's pinned in package.json at the tagged commit.
        #
        # Option A (OIDC): leave NPM_TOKEN unset — npm uses the OIDC exchange.
        # Option B (token): set NPM_TOKEN in repo secrets — it's written to .npmrc here.
        working-directory: integrations/n8n
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
